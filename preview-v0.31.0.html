<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>v0.31.0 PLChart / CFChart 実績/予測分離 プレビュー</title>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@300;400;500&family=Shippori+Mincho:wght@400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  body {
    background: #0a0a0b;
    color: rgba(255,255,255,0.92);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 40px 20px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-weight: 400;
    font-size: 24px;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .sub {
    font-family: 'Saira Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #D4A03A;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .chart-wrap {
    background: #131316;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 40px 36px;
    margin-bottom: 40px;
  }
  .chart-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 18px;
    letter-spacing: 0.06em;
  }
  .legend-row {
    display: flex;
    gap: 28px;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sublegend-row {
    display: flex;
    gap: 18px;
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.32);
    text-transform: uppercase;
  }
  .chart-area {
    display: flex;
    height: 280px;
    margin-top: 28px;
  }
  .yaxis {
    width: 72px;
    flex-shrink: 0;
    padding-right: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-bottom: 28px;
  }
  .yaxis span {
    font-family: 'Saira Condensed', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.32);
    text-align: right;
    font-feature-settings: 'tnum' 1;
  }
  .chart-body {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .plot {
    flex: 1;
    position: relative;
  }
  .grid-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .bars {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
  }
  .bar-group {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 3px;
    height: 100%;
  }
  .bar {
    width: 10px;
    display: flex;
    flex-direction: column-reverse;
  }
  .bar-settled {
    width: 100%;
  }
  .bar-forecast {
    width: 100%;
    box-sizing: border-box;
  }
  .xaxis {
    display: flex;
    margin-top: 8px;
  }
  .xaxis span {
    flex: 1;
    text-align: center;
    font-family: 'Saira Condensed', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.32);
    letter-spacing: 0.15em;
  }
  .note {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    line-height: 1.9;
    color: rgba(255,255,255,0.55);
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .note strong { color: #D4A03A; font-weight: 500; }
  .swatch-solid {
    width: 14px;
    height: 10px;
    background: rgba(255,255,255,0.55);
    display: inline-block;
  }
  .swatch-hatched {
    width: 14px;
    height: 10px;
    background: repeating-linear-gradient(135deg, rgba(255,255,255,0.55) 0 2px, transparent 2px 5px);
    border: 1px solid rgba(255,255,255,0.55);
    box-sizing: border-box;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="sub">— v0.31.0 PREVIEW</div>
  <h1>経営チャート 実績/予測分離</h1>
  <p style="color: rgba(255,255,255,0.55); font-size: 13px; line-height: 1.8; max-width: 700px; margin-bottom: 40px;">
    棒の<strong style="color:#D4A03A">下段=実績(実塗り)</strong>・<strong style="color:#D4A03A">上段=見込み(斜線)</strong>に分離。利益折れ線は<strong style="color:#1B4D3E">確定利益(実線)</strong>と<strong style="color:#1B4D3E">着地見込み利益(点線)</strong>の2本に分離。
  </p>

  <div class="chart-wrap">
    <div class="chart-title">PL チャート — 損益(発生主義)</div>
    <div class="legend-row">
      <span class="legend"><span style="width:12px;height:12px;background:#D4A03A"></span>売上</span>
      <span class="legend"><span style="width:12px;height:12px;background:#C23728"></span>経費</span>
      <span class="legend"><span style="width:12px;height:2px;background:#1B4D3E;transform:translateY(-4px)"></span>利益</span>
    </div>
    <div class="sublegend-row">
      <span class="legend"><span class="swatch-solid"></span>実績</span>
      <span class="legend"><span class="swatch-hatched"></span>見込み</span>
    </div>

    <div class="chart-area">
      <div class="yaxis">
        <span>¥1,000,000</span>
        <span>¥750,000</span>
        <span>¥500,000</span>
        <span>¥250,000</span>
        <span>¥0</span>
      </div>
      <div class="chart-body">
        <div class="plot" id="plot"></div>
        <div class="xaxis" id="xaxis"></div>
      </div>
    </div>
  </div>

  <p class="note">
    シナリオ:1〜4月=確定実績(settled)、5月=売上 billed/経費 settled、6月以降=見込み(forecast)。
    <br>境界月=4月(最後に settled が存在する月)。<strong>5月以降の利益折れ線は点線</strong>として描画。
  </p>
</div>

<script>
const data = [
  { m: 1, revS: 80000, revF: 0, expS: 30000, expF: 0 },
  { m: 2, revS: 120000, revF: 0, expS: 40000, expF: 0 },
  { m: 3, revS: 150000, revF: 0, expS: 50000, expF: 0 },
  { m: 4, revS: 180000, revF: 0, expS: 60000, expF: 0 },  // 境界月
  { m: 5, revS: 0, revF: 200000, expS: 70000, expF: 0 },  // 売上billed・経費settled
  { m: 6, revS: 0, revF: 250000, expS: 0, expF: 80000 },
  { m: 7, revS: 0, revF: 300000, expS: 0, expF: 90000 },
  { m: 8, revS: 0, revF: 280000, expS: 0, expF: 85000 },
  { m: 9, revS: 0, revF: 320000, expS: 0, expF: 95000 },
  { m: 10, revS: 0, revF: 350000, expS: 0, expF: 100000 },
  { m: 11, revS: 0, revF: 380000, expS: 0, expF: 105000 },
  { m: 12, revS: 0, revF: 400000, expS: 0, expF: 110000 },
];
const chartMax = 1000000;
const C = { gold: '#D4A03A', crimson: '#C23728', green: '#1B4D3E' };

const plot = document.getElementById('plot');
// グリッド線
[0, 250000, 500000, 750000, 1000000].forEach(t => {
  const div = document.createElement('div');
  div.className = 'grid-line';
  div.style.bottom = `${(t / chartMax) * 100}%`;
  plot.appendChild(div);
});

// 棒
const bars = document.createElement('div');
bars.className = 'bars';
data.forEach(d => {
  const rev = d.revS + d.revF;
  const exp = d.expS + d.expF;
  const grp = document.createElement('div');
  grp.className = 'bar-group';

  // 売上棒
  const revBar = document.createElement('div');
  revBar.className = 'bar';
  revBar.style.height = `${(rev / chartMax) * 100}%`;
  revBar.style.opacity = rev > 0 ? 1 : 0;
  revBar.title = `${d.m}月 売上 ¥${rev.toLocaleString()}\n  実績 ¥${d.revS.toLocaleString()}\n  見込み ¥${d.revF.toLocaleString()}`;
  const revSettled = document.createElement('div');
  revSettled.className = 'bar-settled';
  revSettled.style.background = C.gold;
  revSettled.style.height = `${rev > 0 ? (d.revS / rev) * 100 : 0}%`;
  const revForecast = document.createElement('div');
  revForecast.className = 'bar-forecast';
  revForecast.style.background = `repeating-linear-gradient(135deg, ${C.gold} 0 2px, transparent 2px 5px)`;
  revForecast.style.border = `1px solid ${C.gold}`;
  revForecast.style.height = `${rev > 0 ? (d.revF / rev) * 100 : 0}%`;
  revBar.appendChild(revSettled);
  revBar.appendChild(revForecast);

  // 経費棒
  const expBar = document.createElement('div');
  expBar.className = 'bar';
  expBar.style.height = `${(exp / chartMax) * 100}%`;
  expBar.style.opacity = exp > 0 ? 1 : 0;
  expBar.title = `${d.m}月 経費 ¥${exp.toLocaleString()}\n  実績 ¥${d.expS.toLocaleString()}\n  見込み ¥${d.expF.toLocaleString()}`;
  const expSettled = document.createElement('div');
  expSettled.className = 'bar-settled';
  expSettled.style.background = C.crimson;
  expSettled.style.height = `${exp > 0 ? (d.expS / exp) * 100 : 0}%`;
  const expForecast = document.createElement('div');
  expForecast.className = 'bar-forecast';
  expForecast.style.background = `repeating-linear-gradient(135deg, ${C.crimson} 0 2px, transparent 2px 5px)`;
  expForecast.style.border = `1px solid ${C.crimson}`;
  expForecast.style.height = `${exp > 0 ? (d.expF / exp) * 100 : 0}%`;
  expBar.appendChild(expSettled);
  expBar.appendChild(expForecast);

  grp.appendChild(revBar);
  grp.appendChild(expBar);
  bars.appendChild(grp);
});
plot.appendChild(bars);

// 利益折れ線 SVG
const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svg.style.position = 'absolute';
svg.style.inset = '0';
svg.style.width = '100%';
svg.style.height = '100%';
svg.style.pointerEvents = 'none';
svg.setAttribute('preserveAspectRatio', 'none');
svg.setAttribute('viewBox', '0 0 100 100');

const lastSettledIdx = (() => {
  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i].revS > 0 || data[i].expS > 0) return i;
  }
  return -1;
})();
console.log('lastSettledIdx =', lastSettledIdx, '(should be 4 for May which has expS)');

// 着地見込み(全status・点線)
const forecastPts = data.map((d, i) => {
  const profit = (d.revS + d.revF) - (d.expS + d.expF);
  const x = ((i + 0.5) / 12) * 100;
  const y = 100 - Math.max(0, (profit / chartMax) * 100);
  return `${x},${y}`;
}).join(' ');
const forecastLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
forecastLine.setAttribute('fill', 'none');
forecastLine.setAttribute('stroke', C.green);
forecastLine.setAttribute('stroke-width', '0.4');
forecastLine.setAttribute('stroke-linecap', 'round');
forecastLine.setAttribute('stroke-linejoin', 'round');
forecastLine.setAttribute('stroke-dasharray', '1.5 1.2');
forecastLine.setAttribute('vector-effect', 'non-scaling-stroke');
forecastLine.setAttribute('points', forecastPts);
svg.appendChild(forecastLine);

// 確定利益(settled・実線)
if (lastSettledIdx >= 0) {
  const settledPts = data.filter((_, i) => i <= lastSettledIdx).map((d, i) => {
    const profit = d.revS - d.expS;
    const x = ((i + 0.5) / 12) * 100;
    const y = 100 - Math.max(0, (profit / chartMax) * 100);
    return `${x},${y}`;
  }).join(' ');
  const settledLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  settledLine.setAttribute('fill', 'none');
  settledLine.setAttribute('stroke', C.green);
  settledLine.setAttribute('stroke-width', '0.55');
  settledLine.setAttribute('stroke-linecap', 'round');
  settledLine.setAttribute('stroke-linejoin', 'round');
  settledLine.setAttribute('vector-effect', 'non-scaling-stroke');
  settledLine.setAttribute('points', settledPts);
  svg.appendChild(settledLine);
}
plot.appendChild(svg);

// X軸
const xax = document.getElementById('xaxis');
data.forEach(d => {
  const sp = document.createElement('span');
  sp.textContent = `${d.m}月`;
  xax.appendChild(sp);
});
</script>
</body>
</html>
